<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 My Library</h1>
</header>

<section class="topBar">

    <input
        type="text"
        id="search"
        placeholder="Search franchise..."
    >

    <select id="sort">
        <option value="name">Sort: A-Z</option>
        <option value="score">Sort: Score</option>
    </select>

</section>

<main>

    <div id="library">

        <!-- Cards generated by JavaScript -->

    </div>

</main>

<!-- Floating Add Button -->

<button id="addButton">
    +
</button>

<!-- Add Franchise Modal -->

<div id="franchiseModal" class="modal">

    <div class="modalBox">

        <h2>Add Franchise</h2>

        <label>Name</label>

        <input
            type="text"
            id="franchiseName"
            placeholder="Frieren"
        >

        <label>My Score</label>

        <input
            type="number"
            id="franchiseScore"
            min="0"
            max="100"
            placeholder="98"
        >

        <div class="modalButtons">

            <button id="saveFranchise">
                Save
            </button>

            <button id="cancelFranchise">
                Cancel
            </button>

        </div>

    </div>

</div>

<!-- Franchise Details -->

<div id="detailsPage">

    <header class="detailsHeader">

        <button id="backButton">
            ←
        </button>

        <h2 id="detailsTitle">
            Franchise
        </h2>

    </header>

    <section class="scoreBox">

        <span>
            ⭐ Score:
        </span>

        <span id="detailsScore">
            0
        </span>

        <button id="editScore">
            Edit
        </button>

    </section>

    <section>

        <h3>
            Activities
        </h3>

        <div id="activityList">

        </div>

    </section>

    <button id="addActivity">
        + Add Activity
    </button>

    <button id="deleteFranchise">
        Delete Franchise
    </button>

</div>

<!-- Add Activity Modal -->

<div id="activityModal" class="modal">

    <div class="modalBox">

        <h2>
            Add Activity
        </h2>

        <label>
            Type
        </label>

        <select id="activityType">

            <option>Anime</option>
            <option>Manga</option>
            <option>Manhwa</option>
            <option>Novel</option>
            <option>Movie</option>
            <option>Game</option>

        </select>

        <label>
            Status
        </label>

        <select id="activityStatus">

            <option>Watching</option>
            <option>Reading</option>
            <option>Playing</option>
            <option>Completed</option>
            <option>Planned</option>
            <option>On Hold</option>
            <option>Dropped</option>

        </select>

        <label>
            Progress
        </label>

        <input
            type="text"
            id="activityProgress"
            placeholder="S1 E12 / Ch145"
        >

        <div class="modalButtons">

            <button id="saveActivity">
                Save
            </button>

            <button id="cancelActivity">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
